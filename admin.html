<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bumper Fix — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #0C0C0C;
      --bg2:   #161616;
      --bg3:   #1F1F1F;
      --bg4:   #272727;
      --white: #FFFFFF;
      --ink2:  #E0E0E0;
      --mid:   #888888;
      --line:  rgba(255,255,255,0.08);
      --red:   #D92626;
      --green: #16A34A;
      --amber: #D97706;
      --blue:  #2563EB;
      --purple:#7C3AED;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-box {
      width: 100%; max-width: 380px;
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      background: linear-gradient(90deg,#FF0000,#FF6600,#FFD600,#00CC44,#0088FF,#6600FF,#CC00FF,#FF0066);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .login-sub { color: var(--mid); font-size: 13px; margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg3); border: 1px solid var(--line);
      border-radius: 8px; color: var(--white); font-size: 14px;
      outline: none; margin-bottom: 14px;
    }
    .login-input:focus { border-color: var(--red); }
    .login-btn {
      width: 100%; padding: 13px;
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'Anton', sans-serif; font-size: 16px; letter-spacing: 0.05em;
      cursor: pointer;
    }
    .login-btn:hover { background: #B81E1E; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

    /* ── SHELL ── */
    #adminShell { display: none; height: 100vh; overflow: hidden; }
    .admin-layout { display: flex; height: 100%; }

    /* ── SIDEBAR ── */
    .admin-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      padding: 24px 0;
    }
    .sidebar-brand {
      font-family: 'Anton', sans-serif; font-size: 18px;
      letter-spacing: 0.04em; padding: 0 20px 24px;
      border-bottom: 1px solid var(--line);
    }
    .sidebar-brand span {
      background: linear-gradient(90deg,#FF0000,#FF6600,#FFD600,#00CC44,#0088FF,#6600FF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sidebar-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .nav-btn {
      width: 100%; text-align: left; padding: 10px 12px;
      background: none; border: none; border-radius: 8px;
      color: var(--mid); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--bg3); color: var(--white); }
    .nav-btn.active { background: var(--bg3); color: var(--white); }
    .nav-btn .nav-icon { margin-right: 8px; }
    .sidebar-logout {
      padding: 0 12px 0;
    }
    .logout-btn {
      width: 100%; padding: 10px 12px;
      background: none; border: 1px solid var(--line);
      border-radius: 8px; color: var(--mid);
      font-size: 13px; cursor: pointer;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── MAIN ── */
    .admin-main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .admin-topbar {
      padding: 20px 28px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg2); position: sticky; top: 0; z-index: 10;
    }
    .admin-topbar h1 { font-family: 'Anton', sans-serif; font-size: 22px; letter-spacing: 0.03em; }
    .topbar-actions { display: flex; gap: 10px; }
    .btn-primary {
      padding: 9px 18px; background: var(--red); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #B81E1E; }
    .btn-outline {
      padding: 9px 18px; background: none;
      border: 1px solid var(--line); color: var(--ink2);
      border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.3); }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 16px; padding: 20px 28px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px 18px;
    }
    .stat-label { font-size: 11px; color: var(--mid); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: 'Anton', sans-serif; font-size: 28px; margin-top: 4px; }

    /* ── CONTENT PANELS ── */
    .panel { padding: 0 28px 28px; display: none; }
    .panel.active { display: block; }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .panel-head h2 { font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: 0.03em; }
    .filter-row { display: flex; gap: 10px; }
    .filter-select {
      padding: 8px 12px; background: var(--bg3);
      border: 1px solid var(--line); border-radius: 8px;
      color: var(--white); font-size: 13px; outline: none;
    }

    /* ── BOOKING CARDS ── */
    .booking-list { display: flex; flex-direction: column; gap: 10px; }
    .booking-card {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: 12px; padding: 16px 20px;
      transition: border-color 0.15s;
    }
    .booking-card:hover { border-color: rgba(255,255,255,0.15); }
    .booking-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .booking-name { font-weight: 600; font-size: 15px; }
    .booking-meta { color: var(--mid); font-size: 12px; margin-top: 2px; }
    .booking-card-mid { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
    .booking-detail { font-size: 13px; }
    .booking-detail strong { color: var(--ink2); }
    .booking-detail span { color: var(--mid); margin-right: 4px; font-size: 11px; }
    .booking-note { font-size: 12px; color: var(--mid); font-style: italic; margin-top: 4px; }
    .booking-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--line); background: var(--bg3);
      color: var(--ink2); font-size: 12px; font-weight: 500; cursor: pointer;
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.3); }
    .action-btn.confirm { border-color: var(--green); color: var(--green); }
    .action-btn.confirm:hover { background: var(--green); color: #fff; }
    .action-btn.cancel { border-color: var(--red); color: var(--red); }
    .action-btn.cancel:hover { background: var(--red); color: #fff; }
    .action-btn.complete { border-color: var(--blue); color: var(--blue); }
    .action-btn.complete:hover { background: var(--blue); color: #fff; }

    /* ── STATUS BADGES ── */
    .status-badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .status-confirmed       { background: rgba(22,163,74,0.15);  color: #4ade80; }
    .status-yes_confirmed   { background: rgba(22,163,74,0.25);  color: #4ade80; border: 1px solid #16A34A; }
    .status-canceled        { background: rgba(217,38,38,0.15);  color: #f87171; }
    .status-reschedule_requested { background: rgba(217,119,6,0.15); color: #fbbf24; }
    .status-completed       { background: rgba(37,99,235,0.15);  color: #60a5fa; }
    .status-no_response     { background: rgba(136,136,136,0.15);color: #9ca3af; }
    .status-pending         { background: rgba(124,58,237,0.15); color: #a78bfa; }

    /* ── REPLY BADGE ── */
    .reply-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg3); color: var(--mid); margin-left: 6px;
    }
    .reply-YES { color: #4ade80; }
    .reply-RESCHEDULE { color: #fbbf24; }
    .reply-NO, .reply-STOP, .reply-CANCEL { color: #f87171; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--mid); font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── BLOCKED SLOTS ── */
    .block-form {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: 12px; padding: 20px; margin-bottom: 20px;
      display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 12px; align-items: end;
    }
    .form-group label { display: block; font-size: 11px; color: var(--mid); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--line);
      border-radius: 8px; color: var(--white); font-size: 13px; outline: none;
    }
    .form-input:focus { border-color: var(--red); }
    .blocks-list { display: flex; flex-direction: column; gap: 8px; }
    .block-item {
      background: var(--bg2); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .block-info .block-date { font-weight: 600; font-size: 14px; }
    .block-info .block-time { color: var(--mid); font-size: 12px; margin-top: 2px; }
    .block-reason { color: var(--mid); font-size: 12px; font-style: italic; }
    .delete-btn {
      padding: 5px 12px; background: none;
      border: 1px solid rgba(217,38,38,0.4); border-radius: 6px;
      color: var(--red); font-size: 12px; cursor: pointer;
    }
    .delete-btn:hover { background: var(--red); color: #fff; }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 40px; color: var(--mid); }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--bg3);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--bg3); border: 1px solid var(--line);
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; color: var(--white);
      z-index: 9999; display: none;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">BUMPER FIX</div>
    <div class="login-sub">Admin Dashboard — Authorized Access Only</div>
    <input type="password" id="passwordInput" class="login-input" placeholder="Enter admin password" />
    <button class="login-btn" onclick="doLogin()">SIGN IN</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ── ADMIN SHELL ── -->
<div id="adminShell">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand"><span>BUMPER FIX</span> ADMIN</div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="showPanel('bookings', this)"><span class="nav-icon">📋</span>Bookings</button>
        <button class="nav-btn" onclick="showPanel('confirmed', this)"><span class="nav-icon">✅</span>Confirmed</button>
        <button class="nav-btn" onclick="showPanel('reschedule', this)"><span class="nav-icon">🔄</span>Reschedule</button>
        <button class="nav-btn" onclick="showPanel('completed', this)"><span class="nav-icon">🏁</span>Completed</button>
        <button class="nav-btn" onclick="showPanel('blocked', this)"><span class="nav-icon">🚫</span>Block Slots</button>
      </nav>
      <div class="sidebar-logout">
        <button class="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 id="panelTitle">All Bookings</h1>
        <div class="topbar-actions">
          <button class="btn-outline" onclick="loadAll()">↻ Refresh</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">—</div></div>
        <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value" id="statConfirmed">—</div></div>
        <div class="stat-card"><div class="stat-label">Awaiting Reply</div><div class="stat-value" id="statAwaiting">—</div></div>
        <div class="stat-card"><div class="stat-label">Reschedule</div><div class="stat-value" id="statReschedule">—</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="statCompleted">—</div></div>
      </div>

      <!-- All Bookings -->
      <div class="panel active" id="panel-bookings">
        <div class="panel-head">
          <h2>All Bookings</h2>
          <div class="filter-row">
            <select class="filter-select" id="statusFilter" onchange="renderBookings()">
              <option value="">All Statuses</option>
              <option value="confirmed">Confirmed</option>
              <option value="yes_confirmed">YES Confirmed</option>
              <option value="reschedule_requested">Reschedule</option>
              <option value="canceled">Canceled</option>
              <option value="completed">Completed</option>
              <option value="no_response">No Response</option>
            </select>
          </div>
        </div>
        <div id="bookingListEl" class="booking-list">
          <div class="loading"><div class="spinner"></div>Loading bookings…</div>
        </div>
      </div>

      <!-- Confirmed -->
      <div class="panel" id="panel-confirmed">
        <div class="panel-head"><h2>YES Confirmed Appointments</h2></div>
        <div id="confirmedListEl" class="booking-list"></div>
      </div>

      <!-- Reschedule -->
      <div class="panel" id="panel-reschedule">
        <div class="panel-head"><h2>Reschedule Requests</h2></div>
        <div id="rescheduleListEl" class="booking-list"></div>
      </div>

      <!-- Completed -->
      <div class="panel" id="panel-completed">
        <div class="panel-head"><h2>Completed Jobs</h2></div>
        <div id="completedListEl" class="booking-list"></div>
      </div>

      <!-- Blocked Slots -->
      <div class="panel" id="panel-blocked">
        <div class="panel-head"><h2>Block Slots</h2></div>
        <div class="block-form">
          <div class="form-group">
            <label>Date</label>
            <input type="text" class="form-input" id="blockDate" placeholder="e.g. Monday, April 7, 2026" />
          </div>
          <div class="form-group">
            <label>Time (blank = full day)</label>
            <select class="form-input" id="blockTime">
              <option value="">Full Day</option>
              <option>8:00 AM</option><option>9:00 AM</option><option>10:00 AM</option>
              <option>11:00 AM</option><option>12:00 PM</option><option>1:00 PM</option>
              <option>2:00 PM</option><option>3:00 PM</option><option>4:00 PM</option>
              <option>5:00 PM</option><option>6:00 PM</option>
            </select>
          </div>
          <div class="form-group">
            <label>Reason</label>
            <input type="text" class="form-input" id="blockReason" placeholder="e.g. Lunch, Travel, Personal" />
          </div>
          <button class="btn-primary" onclick="addBlock()" style="height:40px">Block</button>
        </div>
        <div id="blocksListEl" class="blocks-list">
          <div class="loading"><div class="spinner"></div>Loading…</div>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="toast"></div>

<script>
  let token = sessionStorage.getItem('bf_admin_token') || '';
  let allBookings = [];
  let allBlocks   = [];

  // ── AUTH ──────────────────────────────────────────────────────────────────
  if (token) initDashboard();

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById('passwordInput').value;
    const res = await fetch('/api/admin/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) {
      token = pw;
      sessionStorage.setItem('bf_admin_token', pw);
      document.getElementById('loginError').style.display = 'none';
      initDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('bf_admin_token');
    token = '';
    document.getElementById('adminShell').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  }

  function initDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminShell').style.display = 'block';
    loadAll();
  }

  // ── NAVIGATION ────────────────────────────────────────────────────────────
  function showPanel(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');

    const titles = {
      bookings: 'All Bookings', confirmed: 'YES Confirmed',
      reschedule: 'Reschedule Requests', completed: 'Completed Jobs',
      blocked: 'Blocked Slots'
    };
    document.getElementById('panelTitle').textContent = titles[name] || name;

    if (name === 'blocked') renderBlocks();
    else renderFilteredList(name);
  }

  // ── DATA LOADING ──────────────────────────────────────────────────────────
  async function loadAll() {
    await Promise.all([loadBookings(), loadBlocks()]);
  }

  async function loadBookings() {
    const res = await fetch('/api/admin/bookings', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allBookings = data.bookings || [];
    renderStats();
    renderBookings();
    renderFilteredList('confirmed');
    renderFilteredList('reschedule');
    renderFilteredList('completed');
  }

  async function loadBlocks() {
    const res = await fetch('/api/admin/blocked-slots', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    allBlocks = data.blocks || [];
  }

  // ── STATS ─────────────────────────────────────────────────────────────────
  function renderStats() {
    document.getElementById('statTotal').textContent     = allBookings.length;
    document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'yes_confirmed').length;
    document.getElementById('statAwaiting').textContent  = allBookings.filter(b => b.status === 'confirmed').length;
    document.getElementById('statReschedule').textContent= allBookings.filter(b => b.status === 'reschedule_requested').length;
    document.getElementById('statCompleted').textContent = allBookings.filter(b => b.status === 'completed').length;
  }

  // ── BOOKING LIST ──────────────────────────────────────────────────────────
  function renderBookings() {
    const filter = document.getElementById('statusFilter').value;
    const list   = filter ? allBookings.filter(b => b.status === filter) : allBookings;
    document.getElementById('bookingListEl').innerHTML = renderCards(list);
  }

  function renderFilteredList(panelName) {
    const map = {
      confirmed:  { el: 'confirmedListEl',  statuses: ['yes_confirmed'] },
      reschedule: { el: 'rescheduleListEl', statuses: ['reschedule_requested'] },
      completed:  { el: 'completedListEl',  statuses: ['completed'] }
    };
    const cfg = map[panelName];
    if (!cfg) return;
    const el = document.getElementById(cfg.el);
    if (!el) return;
    const list = allBookings.filter(b => cfg.statuses.includes(b.status));
    el.innerHTML = renderCards(list);
  }

  function renderCards(list) {
    if (!list.length) return `<div class="empty-state"><div class="empty-icon">📭</div>No bookings found.</div>`;
    return list.map(b => {
      const statusLabel = (b.status || '').replace(/_/g, ' ');
      const replyClass  = b.customer_reply ? `reply-${b.customer_reply}` : '';
      const replyBadge  = b.customer_reply
        ? `<span class="reply-badge ${replyClass}">Replied: ${b.customer_reply}</span>` : '';
      return `
        <div class="booking-card" id="card-${b.id}">
          <div class="booking-card-top">
            <div>
              <div class="booking-name">${esc(b.name)} ${replyBadge}</div>
              <div class="booking-meta">${esc(b.phone)} · ${esc(b.area)}</div>
            </div>
            <span class="status-badge status-${b.status}">${statusLabel}</span>
          </div>
          <div class="booking-card-mid">
            <div class="booking-detail"><span>DATE</span><strong>${esc(b.date)}</strong></div>
            <div class="booking-detail"><span>TIME</span><strong>${esc(b.time)}</strong></div>
            <div class="booking-detail"><span>BOOKED</span><strong>${formatDate(b.created_at)}</strong></div>
          </div>
          ${b.notes ? `<div class="booking-note">${esc(b.notes)}</div>` : ''}
          <div class="booking-actions" style="margin-top:12px">
            ${b.status !== 'yes_confirmed' && b.status !== 'completed' ? `<button class="action-btn confirm" onclick="updateStatus('${b.id}','yes_confirmed')">✅ Confirm</button>` : ''}
            ${b.status !== 'completed' ? `<button class="action-btn complete" onclick="updateStatus('${b.id}','completed')">🏁 Complete</button>` : ''}
            ${b.status !== 'reschedule_requested' ? `<button class="action-btn" onclick="updateStatus('${b.id}','reschedule_requested')">🔄 Reschedule</button>` : ''}
            ${b.status !== 'canceled' ? `<button class="action-btn cancel" onclick="updateStatus('${b.id}','canceled')">✕ Cancel</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── STATUS UPDATE ─────────────────────────────────────────────────────────
  async function updateStatus(id, status) {
    const labels = {
      yes_confirmed: 'confirmed', completed: 'marked complete',
      reschedule_requested: 'flagged for reschedule', canceled: 'canceled'
    };
    const res = await fetch('/api/admin/update-booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ id, status })
    });
    if (res.ok) {
      toast(`Booking ${labels[status] || status}`);
      await loadBookings();
    } else {
      const d = await res.json();
      toast('Error: ' + (d.error || 'Failed'), true);
    }
  }

  // ── BLOCKED SLOTS ─────────────────────────────────────────────────────────
  function renderBlocks() {
    const el = document.getElementById('blocksListEl');
    if (!allBlocks.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗓️</div>No blocked slots.</div>`;
      return;
    }
    el.innerHTML = allBlocks.map(b => `
      <div class="block-item">
        <div class="block-info">
          <div class="block-date">${esc(b.date)}</div>
          <div class="block-time">${b.time ? b.time : 'Full Day'}</div>
        </div>
        <div class="block-reason">${esc(b.reason || '—')}</div>
        <button class="delete-btn" onclick="deleteBlock('${b.id}')">Remove</button>
      </div>`).join('');
  }

  async function addBlock() {
    const date   = document.getElementById('blockDate').value.trim();
    const time   = document.getElementById('blockTime').value;
    const reason = document.getElementById('blockReason').value.trim();
    if (!date) { toast('Please enter a date.', true); return; }

    const res = await fetch('/api/admin/block-slot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ date, time, reason })
    });
    if (res.ok) {
      document.getElementById('blockDate').value   = '';
      document.getElementById('blockReason').value = '';
      document.getElementById('blockTime').value   = '';
      toast('Slot blocked');
      await loadBlocks();
      renderBlocks();
    } else {
      toast('Failed to block slot.', true);
    }
  }

  async function deleteBlock(id) {
    const res = await fetch('/api/admin/block-slot', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ id })
    });
    if (res.ok) {
      toast('Block removed');
      await loadBlocks();
      renderBlocks();
    }
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
    catch { return iso; }
  }

  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.borderColor = isError ? 'rgba(217,38,38,0.4)' : 'rgba(22,163,74,0.4)';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
